substitutions:
  name: frangipool
  friendly_name: FrangiPool
  local_temp_address: "0x0000000000000000"  # Remplacer par l'adresse de votre sonde locale (voir logs ESPHome au démarrage)
  temp_address: "0x0000000000000000"  # Remplacer par l'adresse de votre sonde canalisation

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}
  project:
    name: frangipool.salt_booster_minimal
    version: "2.0.0"

dashboard_import:
  package_import_url: github://frangipool/esphome-config/salt_booster_minimal.yaml@main

packages:
  base: github://frangipool/esphome-config/packages/base.yaml@main
  filtration: !include packages/filtration.yaml
  electrolyser: github://frangipool/esphome-config/packages/electrolyser.yaml@main
  booster: github://frangipool/esphome-config/packages/booster.yaml@main
