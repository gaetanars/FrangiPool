substitutions:
  name: frangipool
  friendly_name: FrangiPool
  local_temp_address: "0x0000000000000000"
  temp_address: "0x0000000000000000"

esphome:
  min_version: 2024.6.0

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${friendly_name} Fallback Hotspot
    password: !secret ap_password

esp32:
  board: nodemcu-32s
  framework:
    type: esp-idf

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key
  actions:
    - action: force_filtration
      variables:
        hours: int
      then:
        - script.execute:
            id: _start_forced_mode
            hours: !lambda "return hours;"
    - action: recalc_filtration
      then:
        - script.execute: _calcul_filtration

ota:
  - platform: esphome
    password: !secret ota_password

captive_portal:

time:
  - platform: homeassistant
    id: esptime
    timezone: Europe/Paris

one_wire:
  - platform: gpio
    pin: GPIO23

globals:
  - id: g_pump_last_turn_on
    type: int
    restore_value: True
  - id: g_store_pool_temp
    type: float
    restore_value: True

number:
  - platform: template
    name: Consigne Antigel
    id: max_antifreeze_temp
    optimistic: True
    unit_of_measurement: °C
    device_class: temperature
    step: 0.2
    min_value: -2.0
    max_value: 2.0
    restore_value: True
    initial_value: 0.0
    entity_category: config

  - platform: template
    name: Délais mesures (au lancement de la filtration)
    id: pump_uptime_delay
    optimistic: True
    unit_of_measurement: min
    step: 5
    min_value: 5
    max_value: 30
    restore_value: True
    initial_value: 20
    entity_category: config

sensor:
  - platform: dallas_temp
    address: ${local_temp_address}
    name: Température Local
    id: local_temp
    update_interval: 10s
    accuracy_decimals: 1
    filters:
      - sliding_window_moving_average:
          window_size: 18
          send_every: 6
          send_first_at: 6

  - platform: dallas_temp
    address: ${temp_address}
    name: Température Canalisation
    accuracy_decimals: 1
    update_interval: 10s
    id: pipe_temp
    filters:
      - sliding_window_moving_average:
          window_size: 18
          send_every: 6
          send_first_at: 6

  - platform: dallas_temp
    address: ${temp_address}
    id: pipe_temp_raw
    internal: true
    update_interval: 10s

  - platform: template
    name: Température Piscine
    unit_of_measurement: "°C"
    device_class: "temperature"
    state_class: "measurement"
    id: pool_temp
    accuracy_decimals: 1
    lambda: |-
      return id(g_store_pool_temp);

  - platform: template
    name: Pump Uptime
    id: pump_uptime
    internal: true
    unit_of_measurement: "min"
    lambda: |-
      if (id(pump).state){
        return (id(esptime).now().timestamp - id(g_pump_last_turn_on)) / 60.0;
      } else {
        return 0.0;
      }

  - platform: uptime
    name: Uptime
    unit_of_measurement: s
    entity_category: diagnostic

  - platform: wifi_signal
    name: RSSI
    update_interval: 60s
    entity_category: diagnostic

binary_sensor:
  - platform: template
    name: Antigel
    device_class: cold
    id: antifreeze
    icon: mdi:snowflake-alert
    lambda: |-
      static bool state = false;

      float t = id(pipe_temp_raw).state;
      float on_threshold  = id(max_antifreeze_temp).state - 1.0;
      float off_threshold = id(max_antifreeze_temp).state;

      if (!state && t < on_threshold) {
        state = true;
      } else if (state && t >= off_threshold) {
        state = false;
      }

      return state;
    filters:
      - delayed_on: 120s
      - delayed_off: 300s
    on_press:
      then:
        - homeassistant.action:
            action: persistent_notification.create
            data:
              title: Message from ${friendly_name}
            data_template:
              message: >-
                Mode hors-gel actif.
                Température canalisation : {{ states('sensor.temperature_canalisation') }} °C
    on_release:
      then:
        - homeassistant.action:
            action: persistent_notification.create
            data:
              title: Message from ${friendly_name}
            data_template:
              message: >-
                Fin du mode hors-gel.
                Température canalisation : {{ states('sensor.temperature_canalisation') }} °C

  - platform: status
    name: Status
    entity_category: diagnostic

switch:
  # Scheduler-owned: authoritative writer is packages/filtration.yaml (interval 30s).
  - platform: gpio
    pin:
      number: GPIO25
      inverted: true
    name: Filtration
    id: pump
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:engine
    entity_category: diagnostic
    on_turn_on:
      then:
        - globals.set:
            id: g_pump_last_turn_on
            value: !lambda "return id(esptime).now().timestamp;"

button:
  - platform: restart
    name: Reboot

status_led:
  pin:
    number: GPIO2
    inverted: yes

interval:
  - interval: 1min
    then:
      - if:
          condition:
            and:
              - switch.is_on: pump
              - lambda: "return id(pump_uptime).state >= id(pump_uptime_delay).state;"
          then:
            - globals.set:
                id: g_store_pool_temp
                value: !lambda "return id(pipe_temp).state;"
