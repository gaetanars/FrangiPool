globals:
  - id: g_h_debut1
    type: int
    restore_value: False
    initial_value: '0'
  - id: g_h_fin1
    type: int
    restore_value: False
    initial_value: '0'
  - id: g_h_debut2
    type: int
    restore_value: False
    initial_value: '0'
  - id: g_h_fin2
    type: int
    restore_value: False
    initial_value: '0'
  # true = logique Hiver, false = logique Courbe (sub-mode du mode Auto)
  # restore_value: true — conserve l'état saisonnier entre les redémarrages pour que
  # l'hystérésis ne reparte pas de zéro à chaque coupure de courant.
  - id: g_auto_submode
    type: bool
    restore_value: True
    initial_value: 'false'
  # true = premier calcul déjà effectué (désactive le seuil d'init à 16 °C)
  - id: g_auto_initialized
    type: bool
    restore_value: True
    initial_value: 'false'
  - id: g_ntp_alert_sent
    type: bool
    restore_value: False
    initial_value: 'false'
  # 0 = hors cycle, 1 = cycle matin, 2 = cycle soir
  - id: g_cycle_phase
    type: int
    restore_value: False
    initial_value: '0'
  # Durée totale calculée (minutes/jour) — exposée comme sensor diagnostique
  - id: g_dur_total_min
    type: int
    restore_value: False
    initial_value: '0'
  # Secondes restantes en mode forcé (décrémenté de 30 à chaque tick de l'intervalle).
  # restore_value: false garantit la non-persistance au reboot (R8).
  - id: g_forced_remaining_s
    type: int
    restore_value: False
    initial_value: '0'

select:
  - platform: template
    name: Mode Filtration
    id: filtration_mode
    optimistic: True
    options:
      - "Off"
      - "Hiver"
      - "Courbe"
      - "Auto"
    restore_value: True
    initial_option: "Auto"
    entity_category: config
    icon: mdi:pool
    on_value:
      then:
        - script.execute: _calcul_filtration

number:
  - platform: template
    name: Coefficient Filtration
    id: filtration_coeff
    optimistic: True
    unit_of_measurement: "%"
    step: 5
    min_value: 50
    max_value: 150
    restore_value: True
    initial_value: 100
    entity_category: config
    on_value:
      then:
        - script.execute: _calcul_filtration

  - platform: template
    name: Durée Pause Filtration
    id: filtration_pause
    optimistic: True
    unit_of_measurement: "h"
    step: 0.5
    min_value: 0
    max_value: 12
    restore_value: True
    initial_value: 8
    entity_category: config
    on_value:
      then:
        - script.execute: _calcul_filtration

  - platform: template
    name: Ratio Matin Filtration
    id: filtration_ratio_matin
    optimistic: True
    unit_of_measurement: "%"
    step: 5
    min_value: 20
    max_value: 50
    restore_value: True
    initial_value: 33
    entity_category: config
    on_value:
      then:
        - script.execute: _calcul_filtration

  - platform: template
    name: Durée Hiver Min
    id: filtration_hiver_min
    optimistic: True
    unit_of_measurement: "h"
    step: 0.5
    min_value: 0
    max_value: 12
    restore_value: True
    initial_value: 3
    entity_category: config
    on_value:
      then:
        - script.execute: _calcul_filtration

  - platform: template
    name: Diviseur Hiver
    id: filtration_diviseur
    optimistic: True
    step: 0.5
    min_value: 1
    max_value: 5
    restore_value: True
    initial_value: 3
    entity_category: config
    on_value:
      then:
        - script.execute: _calcul_filtration

datetime:
  - platform: template
    type: time
    name: Heure Pivot Filtration
    id: filtration_pivot
    optimistic: True
    restore_value: True
    initial_value: "13:30:00"
    entity_category: config
    on_value:
      then:
        - script.execute: _calcul_filtration

button:
  - platform: template
    name: Recalcul Filtration
    id: filtration_recalculate
    entity_category: config
    icon: mdi:calculator-variant
    on_press:
      then:
        - script.execute: _calcul_filtration

  - platform: template
    name: "Forcer Filtration 2h"
    id: filtration_force_2h
    entity_category: config
    icon: mdi:timer-2
    on_press:
      then:
        - lambda: |-
            id(g_forced_remaining_s) = 2 * 3600;
            id(pump).turn_on();
            id(forced_countdown).update();

  - platform: template
    name: "Forcer Filtration 6h"
    id: filtration_force_6h
    entity_category: config
    icon: mdi:timer-6
    on_press:
      then:
        - lambda: |-
            id(g_forced_remaining_s) = 6 * 3600;
            id(pump).turn_on();
            id(forced_countdown).update();

  - platform: template
    name: "Forcer Filtration 24h"
    id: filtration_force_24h
    entity_category: config
    icon: mdi:timer-24
    on_press:
      then:
        - lambda: |-
            id(g_forced_remaining_s) = 24 * 3600;
            id(pump).turn_on();
            id(forced_countdown).update();

  - platform: template
    name: "Arrêter Mode Forcé"
    id: filtration_force_stop
    entity_category: config
    icon: mdi:timer-off-outline
    on_press:
      then:
        - lambda: |-
            id(g_forced_remaining_s) = 0;
            id(pump).turn_off();
            id(forced_countdown).update();

sensor:
  - platform: template
    name: Durée Filtration Journalière
    id: filtration_duree_totale
    unit_of_measurement: "min"
    state_class: measurement
    entity_category: diagnostic
    icon: mdi:timer-outline
    update_interval: never
    lambda: |-
      return (float)id(g_dur_total_min);

text_sensor:
  - platform: template
    name: Horaires Filtration
    id: filtration_horaires
    entity_category: diagnostic
    icon: mdi:clock-time-four-outline
    update_interval: never
    lambda: |-
      char buf[40];
      snprintf(buf, sizeof(buf), "%02d:%02d-%02d:%02d / %02d:%02d-%02d:%02d",
        id(g_h_debut1)/60, id(g_h_debut1)%60,
        id(g_h_fin1)/60,   id(g_h_fin1)%60,
        id(g_h_debut2)/60, id(g_h_debut2)%60,
        id(g_h_fin2)/60,   id(g_h_fin2)%60);
      return {buf};

  - platform: template
    name: Phase Filtration
    id: filtration_phase
    entity_category: diagnostic
    icon: mdi:state-machine
    update_interval: never
    lambda: |-
      switch (id(g_cycle_phase)) {
        case 1:  return {"Cycle matin"};
        case 2:  return {"Cycle soir"};
        default: return {"Pause"};
      }

  - platform: template
    name: Mode Auto Actif
    id: filtration_auto_mode_actif
    entity_category: diagnostic
    icon: mdi:thermometer-auto
    update_interval: never
    lambda: |-
      if (id(filtration_mode).state != "Auto") return {"N/A"};
      return id(g_auto_submode) ? std::string{"Hiver"} : std::string{"Courbe"};

  - platform: template
    name: "Mode Forcé — Temps restant"
    id: forced_countdown
    entity_category: diagnostic
    icon: mdi:timer-play-outline
    update_interval: never
    lambda: |-
      int s = id(g_forced_remaining_s);
      if (s <= 0) return {"Inactif"};
      int h = s / 3600;
      int m = (s % 3600) / 60;
      char buf[20];
      if (h > 0) {
        snprintf(buf, sizeof(buf), "%dh %dmin", h, m);
      } else if (m > 0) {
        snprintf(buf, sizeof(buf), "%dmin", m);
      } else {
        return {"< 1min"};
      }
      return {buf};

time:
  - id: !extend esptime
    on_time_sync:
      # Premier calcul après synchronisation NTP (boot ou re-sync périodique).
      # mode: queued absorbe les re-syncs multiples sans accumulation.
      then:
        - script.execute: _calcul_filtration
    on_time:
      - cron: "0 0 0 * * *"
        then:
          - script.execute: _calcul_filtration

script:
  # Alerte NTP envoyée une seule fois par épisode (via g_ntp_alert_sent guard dans l'interval).
  # L'action HA est tentée EN PREMIER ; le flag n'est posé qu'après pour ne pas bloquer
  # définitivement l'alerte si HA est temporairement indisponible au moment de l'appel.
  - id: _ntp_alert_once
    mode: single
    then:
      - homeassistant.action:
          action: persistent_notification.create
          data:
            title: "${friendly_name} - Heure"
            message: "Heure non synchronisée avec Home Assistant. Pompe à l'arrêt."
      - lambda: 'id(g_ntp_alert_sent) = true;'

  # mode: queued, max_runs: 1 est intentionnel : absorbe les rafales de déclencheurs
  # simultanés (on_value de plusieurs entités, on_time_sync, fin-de-cycle) en une seule
  # exécution. Ne pas passer à mode: single qui ignorerait les appels pendant l'exécution,
  # ni à mode: restart qui annulerait un calcul en cours.
  - id: _calcul_filtration
    mode: queued
    max_runs: 1
    then:
      - lambda: |-
          // 1439 = 23 h 59 — dernière minute de la journée (minutes-depuis-minuit).
          // Ne pas utiliser 1440 : minuit appartient au jour suivant et déclencherait le
          // recalcul midnight avant d'avoir fini le cycle soir.
          constexpr int MAX_MIN = 1439;

          // Mode Off → fenêtres nulles, pompe dormante
          if (id(filtration_mode).state == "Off") {
            id(g_h_debut1) = 0; id(g_h_fin1) = 0;
            id(g_h_debut2) = 0; id(g_h_fin2) = 0;
            id(g_cycle_phase) = 0;
            id(g_dur_total_min) = 0;
            ESP_LOGI("filtration", "Mode Off: fenêtres nulles");
            return;
          }

          // Température avec fallback NaN → 10 °C
          // Valeur conservatrice : maintient une circulation minimale même sans capteur,
          // sans risquer de surcharger la pompe ni de déclencher une bascule Auto intempestive.
          float t = id(pool_temp).state;
          if (std::isnan(t)) t = 10.0f;

          // --- Calcul durée totale ---
          float duree_h = 0.0f;
          std::string mode = id(filtration_mode).state;

          auto calc_courbe = [](float tc) -> float {
            if (tc < 10.0f) tc = 10.0f;
            // Courbe polynomiale du 3e degré ajustée sur les recommandations de filtration.
            // À T ≥ ~30 °C le résultat dépasse 24 h : le clamp à MAX_MIN donne une filtration
            // quasi-continue, ce qui est intentionnel pour les pics de chaleur estivaux.
            return 0.00335f*tc*tc*tc - 0.14953f*tc*tc + 2.43489f*tc - 10.72859f;
          };
          auto calc_hiver = [](float temp, float dur_min, float diviseur) -> float {
            return temp < 10.0f ? dur_min : temp / diviseur;
          };

          if (mode == "Courbe") {
            duree_h = calc_courbe(t);
          } else if (mode == "Hiver") {
            duree_h = calc_hiver(t, id(filtration_hiver_min).state, id(filtration_diviseur).state);
          } else {
            // Mode Auto — hystérésis ±1 °C autour de 16 °C
            // Seuils : bascule Hiver→Courbe à 17 °C, Courbe→Hiver à 15 °C.
            // Premier boot (g_auto_initialized=false) : seuil direct à 16 °C sans hystérésis.
            // g_auto_submode persiste (restore: true) pour conserver l'état saisonnier.
            bool is_hiver = id(g_auto_submode);
            if (!id(g_auto_initialized)) {
              is_hiver = (t < 16.0f);
              id(g_auto_submode) = is_hiver;
              id(g_auto_initialized) = true;
            } else if (is_hiver && t > 17.0f) {
              is_hiver = false;
              id(g_auto_submode) = false;
            } else if (!is_hiver && t < 15.0f) {
              is_hiver = true;
              id(g_auto_submode) = true;
            }
            duree_h = is_hiver
              ? calc_hiver(t, id(filtration_hiver_min).state, id(filtration_diviseur).state)
              : calc_courbe(t);
          }

          // Appliquer coefficient et clamp [0, MAX_MIN]
          duree_h *= id(filtration_coeff).state / 100.0f;
          if (duree_h < 0.0f) duree_h = 0.0f;
          int dur_total_min = (int)(duree_h * 60.0f);
          if (dur_total_min > MAX_MIN) dur_total_min = MAX_MIN;
          id(g_dur_total_min) = dur_total_min;

          // Répartition matin/soir
          int dur_matin_min = (int)(dur_total_min * id(filtration_ratio_matin).state / 100.0f);
          int dur_soir_min  = dur_total_min - dur_matin_min;

          // Pivot et pause (en minutes depuis minuit)
          int pivot_min = id(filtration_pivot).hour * 60 + id(filtration_pivot).minute;
          int pause_min = (int)(id(filtration_pause).state * 60.0f);
          // pause=0 → pause_start == pause_end == pivot : cycles contigus
          int pause_start = pivot_min - pause_min / 2;
          int pause_end   = pivot_min + (pause_min - pause_min / 2); // arrondi correct

          // Clamp pause_start et pause_end dans [0, MAX_MIN] AVANT de dériver les fenêtres.
          // Sans ce clamp, h_fin1 (=pause_start) peut devenir négatif et h_debut2 (=pause_end)
          // peut dépasser MAX_MIN — rendant les fenêtres de pompage silencieusement inactives.
          if (pause_start < 0)       pause_start = 0;
          if (pause_end   > MAX_MIN) pause_end   = MAX_MIN;

          // Calcul fenêtres
          int h_debut1 = pause_start - dur_matin_min;
          int h_fin1   = pause_start;
          int h_debut2 = pause_end;
          int h_fin2   = pause_end + dur_soir_min;

          // Clamping des extrémités (début matin et fin soir)
          if (h_debut1 < 0)       h_debut1 = 0;
          if (h_fin2   > MAX_MIN) h_fin2   = MAX_MIN;

          id(g_h_debut1) = h_debut1; id(g_h_fin1) = h_fin1;
          id(g_h_debut2) = h_debut2; id(g_h_fin2) = h_fin2;

          ESP_LOGI("filtration",
            "Calcul: T=%.1f°C mode=%s dur=%dmin matin:[%02d:%02d-%02d:%02d] soir:[%02d:%02d-%02d:%02d]",
            t, mode.c_str(), dur_total_min,
            h_debut1/60, h_debut1%60, h_fin1/60, h_fin1%60,
            h_debut2/60, h_debut2%60, h_fin2/60, h_fin2%60);
      # Mise à jour des sensors diagnostiques après chaque recalcul
      # (update_interval: never → ne se rafraîchissent que sur appel explicite)
      - component.update: filtration_duree_totale
      - component.update: filtration_horaires
      - component.update: filtration_auto_mode_actif

interval:
  - interval: 30s
    then:
      - lambda: |-
          // Antigel prioritaire — vérifié EN PREMIER, avant tout garde NTP.
          // La protection antigel est indépendante de l'heure : la pompe doit tourner
          // même si HA est indisponible et l'heure non synchronisée.
          if (id(antifreeze).state) {
            id(pump).turn_on();
            return;
          }

          // Mode forcé — vérifié avant le garde NTP pour fonctionner sans synchronisation.
          // Décrémente le compteur de 30 s à chaque tick, maintient la pompe ON, puis
          // rend la main à la planification une fois le compteur épuisé.
          if (id(g_forced_remaining_s) > 0) {
            id(g_forced_remaining_s) -= 30;
            if (id(g_forced_remaining_s) < 0) id(g_forced_remaining_s) = 0;
            id(pump).turn_on();
            id(forced_countdown).update();
            return;
          }

          auto now = id(esptime).now();

          // Guard NTP : sans heure valide, impossible de respecter le planning.
          if (!now.is_valid()) {
            if (!id(g_ntp_alert_sent)) {
              id(_ntp_alert_once).execute();
            }
            ESP_LOGW("filtration", "Heure HA non synchronisée - pompe à l'arrêt");
            id(pump).turn_off();
            return;
          }
          if (id(g_ntp_alert_sent)) {
            id(g_ntp_alert_sent) = false;
          }

          // Mode Off
          if (id(filtration_mode).state == "Off") {
            id(g_cycle_phase) = 0;
            id(pump).turn_off();
            return;
          }

          int current_min = now.hour * 60 + now.minute;

          // Cycle matin (phase 1)
          if (current_min >= id(g_h_debut1) && current_min < id(g_h_fin1)) {
            if (id(g_cycle_phase) != 1) {
              id(g_cycle_phase) = 1;
              id(filtration_phase).update();
            }
            id(pump).turn_on();
            return;
          }

          // Cycle soir (phase 2)
          if (current_min >= id(g_h_debut2) && current_min < id(g_h_fin2)) {
            if (id(g_cycle_phase) != 2) {
              id(g_cycle_phase) = 2;
              id(filtration_phase).update();
            }
            id(pump).turn_on();
            return;
          }

          // Hors fenêtres
          if (id(g_cycle_phase) == 2) {
            // Fin cycle soir → recalcul pour le lendemain
            id(g_cycle_phase) = 0;
            id(filtration_phase).update();
            // Garde mode forcé : recalcul uniquement si aucun mode forcé n'est actif
            if (id(g_forced_remaining_s) == 0) id(_calcul_filtration).execute();
          } else if (id(g_cycle_phase) == 1) {
            // Entrée pause → recalcul avec T post-matin pour dimensionner le cycle soir
            id(g_cycle_phase) = 0;
            id(filtration_phase).update();
            // Garde mode forcé : recalcul uniquement si aucun mode forcé n'est actif
            if (id(g_forced_remaining_s) == 0) id(_calcul_filtration).execute();
          }
          id(pump).turn_off();
