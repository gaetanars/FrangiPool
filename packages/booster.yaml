select:
  - platform: template
    name: Mode Surpresseur
    id: booster_mode
    optimistic: True
    options:
      - "Off"
      - Auto
      - Forcé
    restore_value: True
    initial_option: "Off"
    entity_category: config
    icon: mdi:robot-mower
    on_value:
      - lambda: |-
          if (id(booster_mode).state == "Off") {
            id(booster).turn_off();
          } else if (id(booster_mode).state == "Forcé") {
            id(booster).turn_on();
          }

switch:
  - platform: gpio
    pin:
      number: GPIO26
      inverted: true
    name: Surpresseur
    id: booster
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:robot-mower
