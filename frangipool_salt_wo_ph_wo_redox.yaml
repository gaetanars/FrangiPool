substitutions:
  name: frangipool
  friendly_name: FrangiPool
  local_temp_address: '0xC40416C23220FF28'
  temp_address: '0x160121a14aac6f28'

wifi:
  ap:
    ssid: $friendly_name Fallback Hostspot
    password: "12345678"

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}
  project:
    name: frangipool.salt_wo_ph_wo_redox
    version: "0.1.0"

dashboard_import:
  package_import_url: github://frangipool/esphome-config/frangipool_salt_wo_ph_wo_redox.yaml

esp32:
  board: nodemcu-32s
  framework:
    type: esp-idf

logger:
  level: INFO

api:

ota:
  - platform: esphome

improv_serial:

esp32_improv:
  authorizer: none

captive_portal:

time:
  - platform: homeassistant
    timezone: Europe/Paris
    id: esptime

one_wire:
  - platform: gpio
    pin: GPIO23

globals:
  - id: pump_last_turn_on
    type: int
    restore_value: True
  - id: store_pool_temp
    type: float
    restore_value: True

interval:
  - interval: 30s
    then:
      - if:
          condition:
            binary_sensor.is_on: antifreeze
          then:
            - switch.turn_on: pump
  - interval: 1min
    then:
      - if:
          condition:
            and:
              - switch.is_on: pump
              - lambda: |-
                  if (id(pump_uptime).state >= id(pump_uptime_delay).state){
                    return true;
                  } else {
                    return false;
                  }
          then:
            - globals.set:
                id: store_pool_temp
                value: !lambda "return id(pipe_temp).state;"

select:
  - platform: template
    name: Mode Filtration
    optimistic: True
    options:
      - Auto
      - On 24h
      - "Off"
      - Hiver
    restore_value: True
    initial_option: Auto
    entity_category: config
    icon: mdi:engine

number:
  - platform: template
    name: Consigne Antigel
    id: max_antifreeze_temp
    optimistic: True
    unit_of_measurement: °C
    device_class: temperature
    step: 0.2
    min_value: -2.0
    max_value: 2.0
    restore_value: True
    initial_value: 0.0
    entity_category: config

  - platform: template
    name: Délais Filtration
    id: pump_uptime_delay
    optimistic: True
    unit_of_measurement: min
    step: 5
    min_value: 5
    max_value: 30
    restore_value: True
    initial_value: 10
    entity_category: config

sensor:
  # Sondes de températures
  - platform: dallas_temp
    address: $local_temp_address
    name: Température Local
    id: local_temp
    update_interval: 10s
    accuracy_decimals: 1
    filters:
      - sliding_window_moving_average:
          window_size: 18
          send_every: 6
          send_first_at: 6

  - platform: dallas_temp
    address: $temp_address
    name: Température Canalisation
    accuracy_decimals: 1
    update_interval: 10s
    id: pipe_temp
    filters:
      - sliding_window_moving_average:
          window_size: 18
          send_every: 6
          send_first_at: 6

  - platform: dallas_temp
    address: $temp_address
    id: pipe_temp_raw
    internal: true
    update_interval: 10s

  - platform: template
    name: Température Piscine
    unit_of_measurement: "°C"
    device_class: "temperature"
    state_class: "measurement"
    id: pool_temp
    accuracy_decimals: 1
    lambda: |-
      return id(store_pool_temp);

  - platform: template
    name: Pump Uptime
    id: pump_uptime
    internal: true
    unit_of_measurement: "min"
    lambda: |-
      if (id(pump).state){
        return (id(esptime).now().timestamp - id(pump_last_turn_on)) / 60.0;
      } else {
        return 0.0;
      }

  - platform: template
    internal: True
    id: min_antifreeze_temp
    lambda: return id(max_antifreeze_temp).state - 1;

  - platform: uptime
    name: Uptime
    unit_of_measurement: s
    entity_category: diagnostic

  - platform: wifi_signal
    name: RSSI
    update_interval: 60s
    entity_category: diagnostic

binary_sensor:
  - platform: template
    name: Antigel
    device_class: cold
    id: antifreeze
    icon: mdi:snowflake-alert
    update_interval: 10s
    lambda: |-
      static bool state = false;

      float t = id(pipe_temp_raw).state;
      float on_threshold  = id(max_antifreeze_temp).state - 1.0;
      float off_threshold = id(max_antifreeze_temp).state;

      if (!state && t < on_threshold) {
        state = true;
      } else if (state && t >= off_threshold) {
        state = false;
      }

      return state;
    filters:
      - delayed_on: 120s
      - delayed_off: 300s
    on_press:
      then:
        - homeassistant.action:
            action: persistent_notification.create
            data:
              title: Message from ${friendly_name}
            data_template:
              message: >-
                Mode hors-gel actif.
                Température canalisation : {{ states('sensor.temperature_canalisation') }} °C
    on_release:
      then:
        - switch.turn_off: pump
        - homeassistant.action:
            action: persistent_notification.create
            data:
              title: Message from ${friendly_name}
            data_template:
              message: >-
                Fin du mode hors-gel.
                Température canalisation : {{ states('sensor.temperature_canalisation') }} °C

  - platform: status
    name: Status
    entity_category: diagnostic

switch:
  - platform: gpio
    pin: GPIO25
    name: Filtration
    id: pump
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:engine
    on_turn_on:
      then:
        - globals.set:
            id: pump_last_turn_on
            value: !lambda "return id(esptime).now().timestamp;"

  - platform: gpio
    pin:
      number: GPIO27
      inverted: false
    name: Electrolyseur
    id: electrolyser
    restore_mode: RESTORE_DEFAULT_ON
    icon: mdi:chemical-weapon

button:

  - platform: restart
    name: Reboot

status_led:
  pin:
    number: GPIO2
    inverted: yes
