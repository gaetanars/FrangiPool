# Exemple de fichier secrets.yaml pour FrangiPool.
#
# 1. Copier ce fichier en `secrets.yaml` à la racine du repo (même dossier que
#    les presets `salt_*.yaml`). Ce fichier est gitignored, ne le committe pas.
# 2. Remplacer toutes les valeurs ci-dessous par tes propres secrets.
# 3. Générer une clé API fraîche avec :
#       openssl rand -base64 32
#    (ou sur Windows :
#       python -c "import secrets,base64; print(base64.b64encode(secrets.token_bytes(32)).decode())"
#    )
# 4. Premier flash obligatoirement par USB — Improv a été retiré.

# SSID et mot de passe du WiFi domestique (réseau principal de l'ESP)
wifi_ssid: "YourHomeWiFi"
wifi_password: "change-me-wifi-password"

# Mot de passe de l'AP de secours activé si le WiFi domestique est injoignable.
# WPA2 exige 8 à 63 caractères imprimables ASCII.
# Le captive_portal permet de re-flasher le firmware depuis l'AP — utilise une
# valeur forte.
ap_password: "change-me-fallback-min8chars"

# Clé de chiffrement de l'API ESPHome (protocole Noise).
# Doit faire exactement 32 octets encodés en base64 (44 caractères avec padding).
# La valeur ci-dessous est une clé de zéros — REMPLACE-LA avant de flasher.
api_encryption_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="

# Mot de passe OTA pour les mises à jour firmware.
ota_password: "change-me-ota-password"
